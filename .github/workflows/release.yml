name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: run all CI checks before releasing
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  build-release:
    name: Build release binary
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare release asset
        run: |
          cp target/x86_64-unknown-linux-musl/release/akm akm-linux-x86_64
          sha256sum akm-linux-x86_64 > akm-linux-x86_64.sha256
          # Verify the binary is static
          file akm-linux-x86_64
          ldd akm-linux-x86_64 2>&1 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: |
            akm-linux-x86_64
            akm-linux-x86_64.sha256
          retention-days: 1

  github-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-binary

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "akm ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            akm-linux-x86_64
            akm-linux-x86_64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    environment: CARGO_REGISTRY_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
